# Default synthetic scene — built from REAL public data (Gaia DR3 stars + a real ISS TLE).
# Consumed by scene.build_scene (S1). Truth is known by construction; the golden e2e test
# asserts the recovered residual is under threshold.

[satellite]
name = "ISS (ZARYA)"
catnr = 25544          # CelesTrak CATNR for the ISS

[observation]
# Fixed UTC epoch + exposure so the render is deterministic and reproducible offline.
# `utc` is the EXPOSURE START; the camera centers on the ISS at the exposure MIDPOINT
# (utc + exposure_s/2), per the plan's truth-at-midpoint convention. This time is a REAL
# visible ISS pass over Perth (alt ~73 deg at midpoint), ~0.49 d from the committed TLE epoch
# (2026-06-16T20:48Z) — fetch_fixtures.assert_pass_is_visible fails closed otherwise.
utc = "2026-06-17T08:36:12Z"
exposure_s = 2.0

[observer]            # Perth, Western Australia
lat_deg = -31.95
lon_deg = 115.86
elev_m = 10.0

[camera]
width_px = 2048
height_px = 2048
pixel_scale_arcsec = 5.0    # ~2.8 deg field across 2048 px (W * scale ~= FOV)
center_ra_deg = 133.859637         # resolved by fetch_fixtures from the ISS TLE geometry
center_dec_deg = -42.593177
fov_deg = 2.844             # 2048 * 5.0 / 3600

[noise]
psf_sigma_px = 1.5
read_noise_e = 5.0
gaia_mag_limit = 14.0

[rng]
seed = 20260601
