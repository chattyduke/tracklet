# meta.toml — M1 real-frame metadata for the run.py --image/--meta path (consumed from Sprint 4 on).
# Every value below is from the FITS header (verified this tick by reading the funpacked frame) except
# the observatory site, which the header does NOT carry (flagged for Sprint-3 confirmation — see note).

[frame]
# The retrieved + funpacked plain FITS (produced by fetch.sh; gitignored *.fits).
filename = "20221118T024706C1o.fits"
fits_fz_filename = "20221118T024706C1o.fits.fz"
member_sha256 = "b6dcf797163fab78adca9316f0dcb18eb29e83c8c398ae325a292fad30519ca1"
naxis1 = 6144
naxis2 = 6220
bitpix = 16
bzero = 32768.0   # unsigned-16 frame; ingest (Sprint 2) applies BSCALE/BZERO when casting to float32
bscale = 1.0
science_hdu = 0   # single-HDU PRIMARY image; data is in HDU 0

[timing]
# DATE-OBS is the exposure START on the UTC scale (DDOTI convention). EXPTIME in seconds.
# Sprint 3 (AC 3.1) pins start-vs-midpoint semantics + fails loud on ambiguity; midpoint = start + EXPTIME/2.
date_obs = "2022-11-18T02:47:16.782"   # exposure start, UTC
exptime_s = 10.0
mjd_obs = 59901.11616647

[pointing]
# DDOTI frames carry NO header WCS (verified: 0 WCS keys). Pointing-truth = commanded mount pointing
# (STRCURA/STRCUDE) + a FIXED C1 camera offset DERIVED EMPIRICALLY + NON-CIRCULARLY in Sprint 4 (AC 4.6)
# by blind-solving >=3 OTHER C1 frames. Do NOT feed this into the blind solve (it gets only a WCS-free
# image + a coarse fov hint).
header_wcs_present = false
commanded_ra_deg = 303.6067812823882    # STRCURA
commanded_dec_deg = -16.203963888888893  # STRCUDE
# FIXED C1 camera offset, derived NON-CIRCULARLY (Sprint 4 / AC 4.6, tick 25) by blind-solving 3 OTHER
# same-night C1 frames (20221118T024735/024757/024816 C1o) and taking mean(recovered - commanded). The
# 3 frames agree to a scatter of 0.00011 deg (0.4") — the camera offset is rock-stable (Andon threshold
# ~0.1 deg). This is NOT this frame's own recovered-minus-commanded (that would be circular). The expected
# C1 pointing center for the AC-4.6 gate is therefore commanded + this offset = (305.5563, -14.9639), which
# the target frame's own blind solve (305.5565, -14.9640) overlaps to 0.0002 deg (<< 1.705 deg half-field).
# Derivation provenance + the 3 source frames are documented in PROVENANCE.md.
camera_offset_ra_deg = 1.94952    # mean(recovered_ra - commanded_ra) over the 3 OTHER C1 frames
camera_offset_dec_deg = 1.24011   # mean(recovered_dec - commanded_dec) over the 3 OTHER C1 frames

[solver]
# Coarse blind scale hint only (no position/orientation prior). DDOTI C1 plate scale ~2.0"/px, FOV ~3.41 deg.
fov_deg = 3.41

[satellite]
# Identity is EXTERNAL via the dataset (header BLKNM='BW3'/VSTNM='BW3' + Zenodo title), NOT a correlator.
norad_id = 53807
name = "BLUEWALKER 3"
intl_designator = "2022-111AL"
tle_file = "bluewalker3_53807.tle"
tle_epoch = "22321.51776124"   # 2022-11-17T12:25:34.6 UTC, 0.598 d before the exposure midpoint

[observatory]
# OAN-SPM / DDOTI, San Pedro Martir, Baja California, Mexico. DDOTI sits on the OAN-SPM site.
# CONFIRMED (Sprint 3, tick 23): the published OAN-SPM geodetic coordinates from airmass.org
# (https://airmass.org/observatories/spm: 31 deg 02' 39.60" N / 115 deg 27' 49.50" W / 2830 m;
# decimal 31.044333 / -115.46375 / 2830) — corroborated by the OAN/UNAM site listings. These
# replace the earlier ~placeholder values (31.0442 / -115.4633 / 2790 m). The FITS header carries
# NO site coords, so the site is the published observatory position, not a per-pier survey; the
# residual uncertainty WITHIN the ~hundred-metre OAN-SPM campus is <~25" for the ~510 km BW3 LEO
# (overhead worst case), far below the DOMINANT ~arcminute TLE-age along-track term (0.598 d) named
# in the Sprint-5 degradation report. LEO parallax makes the site material: a ~63 m site error =>
# up to ~25" apparent shift (vs the 10" gate), which is why the placeholder was confirmed-to-source.
name = "OAN-SPM / DDOTI (San Pedro Martir, MX)"
lat_deg = 31.044333
lon_deg = -115.46375
elev_m = 2830.0
site_confirmed = true   # confirmed to the published OAN-SPM position (airmass.org / OAN-UNAM), tick 23
